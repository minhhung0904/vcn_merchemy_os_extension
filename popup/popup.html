<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchemy OS - Etsy</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ═══════════════════ LOGIN VIEW ═══════════════════ -->
  <div class="container" id="view-login">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Merchemy<span class="logo-accent"> OS</span></span>
      </div>
    </header>

    <div class="login-hero">
      <p class="login-sub">Sign in to start syncing Etsy orders</p>
    </div>

    <div class="login-form">
      <div class="field-group">
        <label class="label" for="login-email">Email</label>
        <input type="email" id="login-email" class="input" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="label" for="login-password">Password</label>
        <div class="input-row">
          <input type="password" id="login-password" class="input" placeholder="••••••••" autocomplete="current-password" />
          <button class="btn-eye" id="btn-login-eye" title="Show/hide">👁</button>
        </div>
      </div>

      <div class="login-error" id="login-error" style="display:none;"></div>

      <button class="btn btn-primary btn-full" id="btn-login">
        <span id="btn-login-label">Sign In</span>
      </button>
    </div>
  </div>

  <!-- ═══════════════════ ORG SELECT VIEW ═══════════════════ -->
  <div class="container" id="view-org" style="display:none;">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Merchemy<span class="logo-accent"> OS</span></span>
      </div>
    </header>

    <div class="login-hero">
      <p class="login-sub">Select your organization to continue</p>
    </div>

    <div class="login-form">
      <div class="field-group">
        <label class="label" for="org-select">Organization</label>
        <select id="org-select" class="input"></select>
      </div>

      <div class="login-error" id="org-error" style="display:none;"></div>

      <button class="btn btn-primary btn-full" id="btn-org-select">
        <span id="btn-org-label">Continue</span>
      </button>
      <button class="btn btn-secondary btn-full" style="margin-top: 10px;" id="btn-org-cancel">
        Cancel
      </button>
    </div>
  </div>

  <!-- ═══════════════════ MAIN VIEW ═══════════════════ -->
  <div class="container" id="view-main" style="display:none;">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Merchemy<span class="logo-accent"> Scraper</span></span>
      </div>
      <div class="header-right">
        <span class="user-badge" id="user-badge"></span>
        <button class="btn-icon" id="btn-logout" title="Sign out">🚪</button>
      </div>
    </header>

    <!-- Platform Selector -->
    <section class="section">
      <label class="label">Platform</label>
      <div class="platform-tabs">
        <button class="platform-tab active" data-platform="etsy">Etsy</button>
        <button class="platform-tab disabled" data-platform="other" title="Coming soon">Other Platforms <br> Comming soon...</button>
      </div>
    </section>
    
    <!-- Store Name + Shop ID -->
    <section class="section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <label class="label" style="margin-bottom: 0;">Etsy Store Info</label>
        <button id="btn-detect-shop" class="btn-link" style="font-size: 12px; padding: 0;">Auto Detect</button>
      </div>
      <div class="row-2col">
        <input type="text" id="input-store" class="input" placeholder="Store Name" title="Store Name" />
        <input type="text" id="input-shopid" class="input" placeholder="Shop ID" title="Shop ID" />
      </div>
    </section>

    <!-- Auto Sync Settings -->
    <section class="section">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="toggle-autosync" style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
          <label class="label" for="toggle-autosync" style="margin-bottom: 0; cursor: pointer; font-weight: 500;">Enable Auto-Sync</label>
        </div>
        <button id="btn-save-sync" class="btn btn-primary" style="padding: 4px 12px; font-size: 11px;">Save Settings</button>
      </div>
      
      <div id="autosync-options" style="display: none; padding-left: 24px; gap: 8px; flex-direction: column;">
        <div>
          <label class="label" for="sync-mode" style="margin-bottom: 4px;">Frequency</label>
          <select id="sync-mode" class="input">
            <option value="daily">Daily at specific time</option>
            <option value="hourly">Every N hours</option>
          </select>
        </div>
        
        <div id="sync-time-wrap" style="display: flex; gap: 4px; align-items: center;">
          <label class="label" style="margin-bottom: 0; width: 60px;">Time:</label>
          <select id="sync-time-h" class="input" style="width: 50px; padding: 4px;">
            <option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
          </select>
          <span>:</span>
          <select id="sync-time-m" class="input" style="width: 50px; padding: 4px;">
            <option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
          </select>
          <select id="sync-time-ampm" class="input" style="width: 60px; padding: 4px;">
            <option value="AM">AM</option><option value="PM">PM</option>
          </select>
        </div>
        
        <div id="sync-hours-wrap" style="display: none; flex-direction: column; gap: 8px;">
          <div style="display: flex; gap: 8px; align-items: center;">
            <label class="label" for="sync-hours" style="margin-bottom: 0; width: 60px;">Hours:</label>
            <input type="number" id="sync-hours" class="input" style="width: 60px;" value="4" min="1" max="24" />
          </div>
          <div style="display: flex; gap: 4px; align-items: center;">
            <label class="label" style="margin-bottom: 0; width: 60px;">Start at:</label>
            <select id="sync-start-h" class="input" style="width: 50px; padding: 4px;">
              <option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
            </select>
            <span>:</span>
            <select id="sync-start-m" class="input" style="width: 50px; padding: 4px;">
              <option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
            </select>
            <select id="sync-start-ampm" class="input" style="width: 60px; padding: 4px;">
              <option value="AM">AM</option><option value="PM">PM</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Status -->
    <div class="status-box" id="status-box">
      <span id="status-icon">🔍</span>
      <span id="status-text">Ready. Navigate to any Etsy page, then click Fetch Orders.</span>
    </div>

    <!-- Preview Table -->
    <div class="preview-section" id="preview-section" style="display:none;">
      <div class="preview-header">
        <span id="preview-count">0 orders found</span>
        <button class="btn-link" id="btn-clear">Clear</button>
      </div>
      <div class="table-wrap">
        <table class="preview-table">
          <thead>
            <tr><th>#</th><th>Order ID</th><th>Date</th><th>Customer</th><th>SKU</th><th>Qty</th><th>Total</th></tr>
          </thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-secondary" id="btn-scrape"><span>📥</span> Fetch Orders</button>
      <button class="btn btn-primary" id="btn-push" disabled><span>🚀</span> Push to Merchemy</button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrap" id="progress-wrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span id="api-status">🟢 Connected</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
