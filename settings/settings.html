<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sellfern – Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="page">
      <header class="hdr">
        <span class="hdr-logo"><img src="../icons/icon32.png" alt="Logo" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 6px;" /> Sellfern</span>
        <span class="hdr-sub">Settings</span>
      </header>

      <main class="main">
        <!-- API Token -->
        <section class="card">
          <h2 class="card-title">API Token</h2>
          <div class="field">
            <label for="api-token">Merchemy OS API Token</label>
            <div class="input-row">
              <input
                id="api-token"
                type="password"
                class="input"
                placeholder="sk_..."
                autocomplete="off"
              />
              <button class="btn-eye" id="btn-token-eye" title="Show/hide" type="button">👁</button>
            </div>
            <span class="hint"
              >Tạo token tại Merchemy OS → Settings → API Tokens, rồi dán vào
              đây. Token này đã gắn sẵn với 1 tổ chức (org) cụ thể — không cần
              đăng nhập hay chọn org trong extension nữa.</span
            >
          </div>
          <div class="actions">
            <button class="btn btn-outline btn-sm" id="btn-test-connection" type="button">
              Test Connection
            </button>
            <span class="conn-status" id="conn-status"></span>
          </div>
        </section>

        <!-- Defaults -->
        <section class="card">
          <h2 class="card-title">Defaults</h2>
          <div class="field">
            <label for="default-store">Default Store Name</label>
            <input
              id="default-store"
              type="text"
              class="input"
              placeholder="e.g. MyEtsyShop"
            />
            <span class="hint">Pre-fills the store name in the popup.</span>
          </div>
          <div class="field">
            <label for="default-shopid">Default Etsy Shop ID</label>
            <input
              id="default-shopid"
              type="text"
              class="input"
              placeholder="e.g. 57646241"
            />
            <span class="hint">Numeric ID from the Etsy Shop Manager URL.</span>
          </div>
        </section>

        <!-- Save -->
        <div class="actions">
          <button class="btn btn-primary" id="btn-save">
            💾 Save Settings
          </button>
          <span class="save-status" id="save-status"></span>
        </div>
      </main>
    </div>
    <script src="../config.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
