<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sellfern – Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="page">
      <header class="hdr">
        <span class="hdr-logo"><img src="../icons/icon32.png" alt="Logo" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 6px;" /> Sellfern</span>
        <span class="hdr-sub">Settings</span>
      </header>

      <main class="main">
        <!-- Account -->
        <section class="card">
          <h2 class="card-title">Account</h2>
          <div class="user-row" id="user-row-loggedin" style="display: none">
            <div class="user-info">
              <span class="user-avatar">👤</span>
              <div>
                <div class="user-email" id="s-user-email">—</div>
                <div class="user-status">🟢 Signed in</div>
              </div>
            </div>
            <button class="btn btn-outline btn-sm" id="btn-signout">
              Sign Out
            </button>
          </div>
          <div class="user-row" id="user-row-loggedout" style="display: none">
            <span style="font-size: 13px; color: var(--muted)"
              >Not signed in.</span
            >
            <button class="btn btn-primary btn-sm" id="btn-goto-login">
              Sign In
            </button>
          </div>
        </section>

        <!-- Defaults -->
        <section class="card">
          <h2 class="card-title">Defaults</h2>
          <div class="field">
            <label for="default-store">Default Store Name</label>
            <input
              id="default-store"
              type="text"
              class="input"
              placeholder="e.g. MyEtsyShop"
            />
            <span class="hint">Pre-fills the store name in the popup.</span>
          </div>
          <div class="field">
            <label for="default-shopid">Default Etsy Shop ID</label>
            <input
              id="default-shopid"
              type="text"
              class="input"
              placeholder="e.g. 57646241"
            />
            <span class="hint">Numeric ID from the Etsy Shop Manager URL.</span>
          </div>
        </section>

        <!-- Save -->
        <div class="actions">
          <button class="btn btn-primary" id="btn-save">
            💾 Save Settings
          </button>
          <span class="save-status" id="save-status"></span>
        </div>
      </main>
    </div>
    <script src="../config.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
